apis:
  - aid: profitwell:metrics-api
    name: ProfitWell Metrics API
    description: >-
      REST API for managing subscription lifecycle data, retrieving SaaS
      financial metrics (MRR, churn, ARPU, LTV), and accessing customer and
      engagement data on the ProfitWell Metrics (Paddle) platform.
      Authentication uses a bare private API key (no Bearer prefix) passed in
      the Authorization header. Trailing slashes on endpoint URLs are
      required.
    humanURL: https://www.paddle.com/help/profitwell-metrics/setup/get-started/profit-well-api
    baseURL: https://api.profitwell.com/v2
