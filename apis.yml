aid: profitwell
name: ProfitWell
description: >-
  ProfitWell (now ProfitWell Metrics by Paddle, following Paddle's 2022
  acquisition of ProfitWell) is a free subscription analytics product that
  delivers accurate, real-time SaaS metrics such as MRR, churn, ARPU, LTV,
  retention, and cohort analysis by connecting directly to billing systems
  like Stripe, Braintree, Chargebee, Recurly, and Paddle. The ProfitWell API
  at https://api.profitwell.com/v2 provides programmatic access to subscription
  lifecycle events, customer data, financial metrics, and engagement data,
  authenticated via a bare API key passed in the Authorization header (no
  Bearer prefix).
type: Index
